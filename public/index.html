<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dad Jokes</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b" id="theme-color-meta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dad Jokes">
  <link rel="apple-touch-icon" href="icon.svg">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fef9f0;
      --card:   #ffffff;
      --text:   #1a1a1a;
      --sub:    #555;
      --muted:  #aaa;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg:     #181818;
      --card:   #242424;
      --text:   #efefef;
      --sub:    #999;
      --muted:  #555;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    /* ── top bar ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1.25rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    #theme-btn {
      background: none;
      border: 1px solid var(--muted);
      border-radius: 1rem;
      padding: 0.25rem 0.7rem;
      font-size: 0.72rem;
      color: var(--sub);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    #theme-btn:hover { border-color: var(--sub); color: var(--text); }

    /* ── main content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--text);
      letter-spacing: -0.02em;
    }

    h1 span { color: #f59e0b; }

    .card {
      background: var(--card);
      border-radius: 1.5rem;
      padding: clamp(1.5rem, 5vw, 3rem);
      max-width: 640px;
      width: 100%;
      box-shadow: 0 4px 32px var(--shadow);
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
      transition: opacity 0.2s ease, background 0.2s;
    }

    .card.fade { opacity: 0; }

    #joke-text {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      line-height: 1.65;
      color: var(--text);
      text-align: center;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 640px;
    }

    button#btn {
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem 2.2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button#btn:hover  { background: #d97706; }
    button#btn:active { transform: scale(0.97); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--sub);
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input { cursor: pointer; accent-color: #f59e0b; }

    .source {
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1rem;
    }

    /* ── footer ── */
    footer {
      text-align: center;
      padding: 0.75rem 1.25rem 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--sub); text-decoration: underline; }

    @media (max-width: 400px) {
      .card { border-radius: 1rem; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <span id="joke-count"></span>
    <button id="theme-btn"></button>
  </div>

  <main>
    <header>
      <h1>Dad <span>Jokes</span></h1>
    </header>

    <div class="card" id="card">
      <p id="joke-text">Loading a joke&hellip;</p>
    </div>

    <div class="controls">
      <button id="btn">Tell me another</button>
      <label class="toggle-row">
        <input type="checkbox" id="internet-toggle">
        Fetch from the internet
      </label>
      <p class="source" id="source"></p>
    </div>
  </main>

  <footer>
    <span>A dad joke a day keeps the doctor away</span>
    <span>&middot;</span>
    <a href="https://icanhazdadjoke.com" target="_blank" rel="noopener">icanhazdadjoke.com</a>
    <span>&middot;</span>
    <a href="https://github.com/clomok/dad-jokes" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    const LOCAL_JOKES = [
      "Why don't scientists trust atoms? Because they make up everything.",
      "I'm reading a book about anti-gravity. It's impossible to put down.",
      "Did you hear about the mathematician who's afraid of negative numbers? He'll stop at nothing to avoid them.",
      "Why did the scarecrow win an award? Because he was outstanding in his field.",
      "I used to hate facial hair, but then it grew on me.",
      "What do you call a fish without eyes? A fsh.",
      "Why can't you give Elsa a balloon? Because she'll let it go.",
      'I asked the librarian if they had books about paranoia. She whispered, "They\'re right behind you."',
      "What do you call cheese that isn't yours? Nacho cheese.",
      "I only know 25 letters of the alphabet. I don't know y.",
      "Why did the bicycle fall over? Because it was two-tired.",
      "What do you call a sleeping dinosaur? A dino-snore.",
      "I told my doctor I broke my arm in two places. He told me to stop going to those places.",
      "Did you hear about the claustrophobic astronaut? He just needed a little space.",
      "Why don't eggs tell jokes? They'd crack each other up.",
      "What do you call a bear with no teeth? A gummy bear.",
      "I'm on a seafood diet. Every time I see food, I eat it.",
      "Why did the golfer bring an extra pair of pants? In case he got a hole in one.",
      "What did the ocean say to the beach? Nothing, it just waved.",
      "I would avoid the sushi if I were you. It's a little fishy."
    ];

    // ── theme ──
    const themeBtn = document.getElementById('theme-btn');
    const metaTheme = document.getElementById('theme-color-meta');

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      themeBtn.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
      metaTheme.setAttribute('content', theme === 'dark' ? '#181818' : '#f59e0b');
    }

    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    });

    applyTheme(document.documentElement.getAttribute('data-theme'));

    // ── joke count ──
    document.getElementById('joke-count').textContent =
      LOCAL_JOKES.length + ' jokes in the local collection';

    // ── jokes ──
    let lastIndex = -1;

    function pickLocal() {
      let i;
      do { i = Math.floor(Math.random() * LOCAL_JOKES.length); }
      while (i === lastIndex && LOCAL_JOKES.length > 1);
      lastIndex = i;
      return { text: LOCAL_JOKES[i], source: 'local collection' };
    }

    async function pickInternet() {
      const res = await fetch('https://icanhazdadjoke.com/', {
        headers: { Accept: 'application/json' }
      });
      if (!res.ok) throw new Error('API error');
      const data = await res.json();
      return { text: data.joke, source: 'icanhazdadjoke.com' };
    }

    const card     = document.getElementById('card');
    const jokeEl   = document.getElementById('joke-text');
    const sourceEl = document.getElementById('source');
    const toggle   = document.getElementById('internet-toggle');

    async function loadJoke() {
      card.classList.add('fade');
      await new Promise(r => setTimeout(r, 200));

      let result;
      try {
        result = toggle.checked ? await pickInternet() : pickLocal();
      } catch {
        result = pickLocal();
        result.source += ' (internet unavailable)';
      }

      jokeEl.textContent = result.text;
      sourceEl.textContent = 'source: ' + result.source;
      card.classList.remove('fade');
    }

    document.getElementById('btn').addEventListener('click', loadJoke);
    loadJoke();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
